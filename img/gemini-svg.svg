<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    
    <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a188f8"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#764ba2" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="5" y="5" width="90" height="90" rx="22" fill="#0f0c1b" stroke="url(#primary)" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="28" y="22" width="16" height="56" rx="8" fill="url(#primary)"/>
    
    <rect x="40" y="22" width="34" height="16" rx="8" fill="url(#primary)"/>
    
    <rect x="40" y="44" width="20" height="16" rx="8" fill="url(#secondary)"/>
  </g>

  <circle cx="68" cy="52" r="6" fill="#ffffff" filter="url(#shadow)"/>
</svg>
